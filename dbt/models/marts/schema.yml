version: 2

models:
  - name: mart_nyc_weather_daily
    description: "Daily NYC weather summary — one row per calendar day."
    columns:
      - name: weather_date
        data_tests: [not_null, unique]

  - name: mart_citi_bike_station_availability
    description: "Current bike/dock availability per Citi Bike station — one row per station."
    columns:
      - name: station_id
        data_tests: [not_null, unique]
